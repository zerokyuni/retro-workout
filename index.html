<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORKOUT TIMER - WORKREC.</title>
    <style>
        @font-face {
            font-family: 'VCR_OSD_MONO';
            src: url('./fonts/VCR_OSD_MONO.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --vcr-green: #00FF00;
            --vcr-red: #FF0000;
            --vcr-blue: #0000AA; 
            --vcr-white: #E0E0E0;
            --bg-color: #050505;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--vcr-white);
            font-family: 'VCR_OSD_MONO', monospace, sans-serif;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* 1. CRT 스캔라인 오버레이 */
        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 100;
        }

        /* 2. 상태 전환 디가우스(Degauss) 효과 (자기장 초기화) */
        .degauss-active {
            animation: crtDegauss 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }
        @keyframes crtDegauss {
            0% { filter: contrast(1) brightness(1); transform: scale(1); }
            15% { filter: contrast(5) brightness(3) invert(0.8) hue-rotate(90deg); transform: scaleY(0.02) scaleX(1.05); }
            35% { filter: contrast(2) brightness(1.5); transform: scaleY(1.1) scaleX(0.95); }
            60% { filter: contrast(1.5) brightness(1.2); transform: scale(1.02); }
            100% { filter: contrast(1) brightness(1); transform: scale(1); }
        }

        /* 3. 재생 중 미세한 글리치 (Tracking Mild) */
        .vcr-play-mild {
            animation: vcrPlayTracking 3s infinite;
        }
        @keyframes vcrPlayTracking {
            0%, 96% { transform: skewX(0); filter: hue-rotate(0); }
            97% { transform: skewX(2deg) translateX(2px); filter: hue-rotate(10deg); }
            98% { transform: skewX(-2deg) translateX(-2px); }
            99% { transform: skewX(0); }
        }

        /* 4. 일시정지 중 강한 노이즈 (Tracking Heavy) */
        .vcr-pause-heavy {
            animation: vcrPauseTracking 0.2s infinite;
        }
        @keyframes vcrPauseTracking {
            0% { transform: translateX(0px); filter: contrast(1.1); }
            50% { transform: translateX(2px) translateY(1px); filter: contrast(0.9); }
            100% { transform: translateX(-1px); filter: contrast(1.1); }
        }

        /* 일시정지 특유의 가로줄 노이즈 (현실적인 VCR 트래킹 에러) */
        .vcr-horizontal-noise {
            display: none; position: absolute; top:0; left:0; width:100%; height:100%;
            background-image: repeating-linear-gradient(0deg, 
                transparent 0%, 
                transparent 15%, 
                rgba(255, 255, 255, 0.5) 16%, 
                transparent 18%,
                transparent 45%,
                rgba(255, 255, 255, 0.4) 47%,
                transparent 49%,
                transparent 80%,
                rgba(255, 255, 255, 0.3) 82%,
                transparent 84%
            );
            background-size: 100% 150px;
            z-index: 5;
            pointer-events: none;
            animation: vcrHorizontalJitter 0.2s infinite steps(5); 
        }
        
        @keyframes vcrHorizontalJitter {
            0% { background-position: 0 0; }
            100% { background-position: 0 150px; }
        }
        
        #screen-timer.is-paused .vcr-horizontal-noise { display: block; }

        /* 일시정지 백그라운드 노이즈 텍스처 (기본 잔잔한 노이즈) */
        .pause-static {
            display: none; position: absolute; top:0; left:0; width:100%; height:100%;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.1) 2px, rgba(255,255,255,0.1) 4px);
            z-index: 1; pointer-events: none; mix-blend-mode: overlay;
        }
        #screen-timer.blue-screen .pause-static { display: block; }

        /* 텍스트 효과 */
        .vcr-text { text-shadow: 2px 2px 0px #000, 0 0 5px rgba(255,255,255,0.5); }
        .text-red { color: var(--vcr-red); text-shadow: 2px 2px 0px #000, 0 0 5px rgba(255,0,0,0.8); }
        .text-green { color: var(--vcr-green); text-shadow: 2px 2px 0px #000, 0 0 5px rgba(0,255,0,0.8); }
        .blink { animation: blinker 1s linear infinite; }
        .blink-fast { animation: blinker 0.3s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* 스크린 레이아웃 공통 */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; padding: 20px; z-index: 10; }
        .screen.active { display: flex; }
        .header { display: flex; justify-content: space-between; font-size: 1.2rem; margin-bottom: 20px; }
        .footer { margin-top: auto; display: flex; justify-content: space-between; font-size: 1rem; }
        .list-container { flex-grow: 1; overflow-y: auto; overflow-x: hidden; margin-bottom: 15px; }
        
        .list-item { padding: 15px; border: 2px solid var(--vcr-white); margin-bottom: 10px; cursor: pointer; background: rgba(0,0,0,0.5); }
        .list-item:active { background: var(--vcr-white); color: #000; }
        
        .btn { background: transparent; border: 2px solid var(--vcr-white); color: var(--vcr-white); font-family: inherit; font-size: 1rem; padding: 10px 15px; cursor: pointer; text-shadow: 1px 1px 0px #000; }
        .btn:active { background: var(--vcr-white); color: #000; }

        /* 폼 입력 (커스텀 빌더) */
        .input-group { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .input-box { background: transparent; border: 2px solid var(--vcr-white); color: var(--vcr-green); font-family: inherit; font-size: 1rem; text-align: center; padding: 5px; width: 100%; }
        
        /* 태그 리스트 */
        .tag-list { min-height: 100px; border: 1px dashed var(--vcr-white); padding: 10px; margin-bottom: 15px; }
        .tag-item { display: flex; justify-content: space-between; align-items: center; border: 2px solid var(--vcr-white); padding: 8px; margin-bottom: 5px; background: #111; font-size: 0.9rem; }
        .tag-actions span { margin-left: 10px; padding: 5px; cursor: pointer; color: var(--vcr-green); }

        /* 채널 뷰어 (TV 스타일) */
        .channel-viewer {
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 2px solid var(--vcr-white); margin-bottom: 15px; background: rgba(0,0,0,0.5);
            padding: 20px; text-align: center;
        }
        .tv-controls { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .tv-controls .btn { flex: 1; font-size: 1.2rem; }

        /* 타이머 뷰파인더 */
        #screen-timer.blue-screen { background-color: var(--vcr-blue); }
        .timer-bg-gif { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); min-width: 100%; min-height: 100%; opacity: 0.4; object-fit: cover; z-index: -1; }
        .timer-status { font-size: 1.5rem; display: flex; justify-content: space-between; margin-bottom: 30px; z-index: 2;}
        .timer-center { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2; }
        .timer-time { font-size: 6rem; font-weight: bold; }
        .timer-round { font-size: 1.5rem; margin-bottom: 10px; color: var(--vcr-green); }
        .timer-caption { background: rgba(0,0,0,0.7); border: 2px solid var(--vcr-white); padding: 15px; text-align: center; font-size: 1.2rem; margin-bottom: 20px; z-index: 2; }
        .timer-controls { display: flex; justify-content: space-between; margin-top: auto; width: 100%; z-index: 2; }
        
        /* 로그 */
        #log-textarea { width: 100%; height: 200px; background: #000; color: var(--vcr-green); border: 2px solid var(--vcr-white); font-family: inherit; font-size: 0.8rem; padding: 10px; margin-bottom: 10px; resize: none; }
    </style>
</head>
<body>

    <!-- CRT 스캔라인 오버레이 -->
    <div class="crt-overlay"></div>

    <!-- 1. 타이틀 화면 (중앙 정렬 완벽 적용) -->
    <div id="screen-title" class="screen active" style="justify-content: center; align-items: center; text-align: center; cursor: pointer;" onclick="app.playSound('coin'); app.switchScreen('menu')">
        <div>
            <div class="title-logo vcr-text text-red" style="font-size:4rem; margin-bottom:10px;">WORKREC.</div>
            <div class="title-logo vcr-text" style="font-size:2rem;">WORKOUT TIMER</div>
        </div>
        <div class="blink text-green" style="font-size: 1.5rem; margin-top: 50px;">TAP TO START</div>
    </div>

    <!-- 2. TV 채널 뷰어 화면 -->
    <div id="screen-menu" class="screen">
        <img id="menu-bg-gif" class="timer-bg-gif" src="" alt="">
        
        <div class="header"><span>TRACK SELECT</span><span id="menu-time">12:00:00</span></div>
        
        <div class="channel-viewer" id="channel-viewer">
            <!-- JS로 현재 채널 정보 렌더링 -->
        </div>
        
        <div class="tv-controls">
            <button class="btn" onclick="app.prevChannel()">◀ CH-</button>
            <button class="btn text-red blink" onclick="app.startSelectedChannel()" style="flex: 1.5;">[ PLAY ]</button>
            <button class="btn" onclick="app.nextChannel()">CH+ ▶</button>
        </div>

        <div class="footer">
            <button class="btn" onclick="app.switchScreen('builder')">+ NEW TRACK</button>
            <button class="btn" onclick="app.switchScreen('log')">TAPE LOG</button>
        </div>
    </div>

    <!-- 3. 커스텀 채널 빌더 -->
    <div id="screen-builder" class="screen">
        <div class="header"><span>CH SELECT: NEW</span></div>
        <div class="list-container">
            <div class="input-group">
                <span style="white-space:nowrap; margin-right:10px;">NAME:</span>
                <input type="text" id="build-name" class="input-box" value="MY ROUTINE">
            </div>
            
            <div style="border:1px solid #555; padding:10px; margin-bottom:15px;">
                <div style="color:var(--vcr-green); margin-bottom:10px;">[ DEFAULT SETTINGS ]</div>
                <div style="display:flex; gap:10px;">
                    <div>WORK(S) <input type="number" id="build-work" class="input-box" value="45"></div>
                    <div>REST(S) <input type="number" id="build-rest" class="input-box" value="15"></div>
                    <div>SETS <input type="number" id="build-sets" class="input-box" value="5"></div>
                </div>
            </div>
            
            <div>EXERCISE TAGS:</div>
            <div style="font-size:0.7rem; color:#888; margin-bottom:10px;">* 빈칸으로 두면 DEFAULT 시간이 적용됩니다.</div>
            
            <div class="input-group" style="flex-direction: column; align-items: stretch; gap: 5px;">
                <input type="text" id="build-tag-input" class="input-box" placeholder="EX: PUSH UP (NAME)">
                <div style="display: flex; gap: 5px;">
                    <input type="number" id="build-tag-work" class="input-box" placeholder="WORK SEC">
                    <input type="number" id="build-tag-rest" class="input-box" placeholder="REST SEC">
                </div>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="build-tag-gif" class="input-box" placeholder="GIF URL">
                    <button class="btn" onclick="app.addTag()" style="width:80px;">ADD</button>
                </div>
            </div>
            
            <div class="tag-list" id="build-tag-list"></div>
        </div>
        <div class="footer">
            <button class="btn text-red" onclick="app.switchScreen('menu')">CANCEL</button>
            <button class="btn text-green" onclick="app.saveCustomChannel()">SAVE TO TAPE</button>
        </div>
    </div>

    <!-- 4. 타이머 화면 -->
    <div id="screen-timer" class="screen">
        <div class="vcr-horizontal-noise"></div>
        <div class="pause-static"></div>
        <img id="timer-gif" class="timer-bg-gif" src="" alt="">
        
        <div id="timer-content" class="vcr-play-mild" style="display:flex; flex-direction:column; height:100%;">
            <div class="timer-status">
                <span id="timer-indicator" class="text-red blink">● REC</span>
                <span id="timer-battery">[||||]</span>
            </div>
            <div class="timer-center">
                <div id="timer-round" class="timer-round">ROUND 01/05</div>
                <div id="timer-time" class="timer-time vcr-text">00:45</div>
                <div id="timer-state-text" style="margin-top: 10px; font-size: 1.5rem;" class="text-red">WORK</div>
            </div>
            <div class="timer-caption">
                <div id="timer-caption-current" class="vcr-text">[ CURRENT EXERCISE ]</div>
                <div id="timer-caption-next" style="font-size: 0.9rem; margin-top: 5px; color: var(--vcr-green);">NEXT: NONE</div>
            </div>
            
            <div class="timer-controls">
                <button class="btn text-red" onclick="app.stopTimer()">■ STOP</button>
                <button class="btn text-green" id="btn-pause" onclick="app.togglePause()">|| PAUSE</button>
            </div>
        </div>
    </div>

    <!-- 5. 로그 화면 -->
    <div id="screen-log" class="screen">
        <div class="header"><span>TAPE LOG ARCHIVE</span></div>
        <textarea id="log-textarea" readonly></textarea>
        <div class="footer">
            <button class="btn" onclick="app.switchScreen('menu')">BACK</button>
            <button class="btn text-green" onclick="app.importData()">RESTORE</button>
        </div>
    </div>

    <!-- 외부 프리셋 데이터 (없으면 빈 배열 반환) -->
    <script src="./preset/presets.js"></script>

    <script>
        const app = {
            sfx: {
                coin: new Audio('./soundfx/coin.mp3'),
                count: new Audio('./soundfx/countdown.mp3'),
                start: new Audio('./soundfx/start.mp3'),
                rest: new Audio('./soundfx/rest.mp3'),
                complete: new Audio('./soundfx/complete.mp3')
            },
            
            fallbackGif: "./gif/default_fallback.gif",
            defaultChannels: window.VCR_PRESETS || [],
            
            data: { customChannels: [], logs: [], builderTags: [] },
            menuState: { currentIndex: 0 },
            
            // 타이머 상태 (READY 추가)
            timer: { intervalId: null, targetTime: 0, remainingSec: 0, currentRound: 1, state: 'READY', isPaused: false, activeChannel: null },

            init() {
                this.loadData();
                this.updateClock();
                setInterval(() => this.updateClock(), 1000);
            },

            playSound(soundName) {
                try {
                    const sound = this.sfx[soundName];
                    sound.currentTime = 0;
                    sound.play().catch(e => {});
                } catch(e) {}
            },

            triggerDegauss() {
                document.body.classList.remove('degauss-active');
                void document.body.offsetWidth; 
                document.body.classList.add('degauss-active');
            },

            switchScreen(screenName) {
                this.triggerDegauss();
                document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
                document.getElementById(`screen-${screenName}`).classList.add('active');

                if (screenName === 'menu') this.renderMenu();
                if (screenName === 'builder') {
                    this.data.builderTags = [];
                    this.renderTags();
                }
                if (screenName === 'log') this.renderLog();
            },

            updateClock() {
                const now = new Date();
                const menuTime = document.getElementById('menu-time');
                if(menuTime) menuTime.innerText = now.toTimeString().split(' ')[0];
            },

            loadData() {
                const saved = localStorage.getItem('vcr_timer_data');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        this.data.customChannels = parsed.customChannels || [];
                        this.data.logs = parsed.logs || [];
                    } catch(e) {}
                }
            },
            saveData() {
                localStorage.setItem('vcr_timer_data', JSON.stringify({ customChannels: this.data.customChannels, logs: this.data.logs }));
            },

            getAllChannels() {
                return [...this.defaultChannels, ...this.data.customChannels];
            },

            // 채널 전체 소요 시간 계산
            calculateTotalTime(ch) {
                let totalSec = 3; // 초기 READY 시간 3초 포함
                for (let i = 1; i <= ch.sets; i++) {
                    let ex = ch.playlist[(i - 1) % ch.playlist.length];
                    if (typeof ex === 'string') ex = { name: ex, work: null, rest: null };
                    
                    let w = (ex.work !== null && ex.work !== undefined) ? ex.work : ch.work;
                    let r = (ex.rest !== null && ex.rest !== undefined) ? ex.rest : ch.rest;
                    
                    totalSec += w;
                    if (i < ch.sets) totalSec += r; // 마지막 세트 종료 후엔 휴식 제외
                }
                const m = Math.floor(totalSec / 60).toString().padStart(2, '0');
                const s = (totalSec % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            },

            renderMenu() {
                const channels = this.getAllChannels();
                if (channels.length === 0) return;

                if (this.menuState.currentIndex >= channels.length) {
                    this.menuState.currentIndex = 0;
                } else if (this.menuState.currentIndex < 0) {
                    this.menuState.currentIndex = channels.length - 1;
                }

                const ch = channels[this.menuState.currentIndex];
                const chId = (this.menuState.currentIndex + 1).toString().padStart(2, '0');
                const viewer = document.getElementById('channel-viewer');
                
                const menuGifEl = document.getElementById('menu-bg-gif');
                const targetGifSrc = ch.gif || this.fallbackGif;
                menuGifEl.src = targetGifSrc;
                menuGifEl.onerror = () => { 
                    if (menuGifEl.src !== this.fallbackGif && !menuGifEl.src.endsWith(this.fallbackGif)) {
                        menuGifEl.src = this.fallbackGif; 
                    } else {
                        menuGifEl.style.display = 'none'; 
                    }
                };
                menuGifEl.style.display = 'block';
                
                const totalTimeStr = this.calculateTotalTime(ch);
                
                viewer.innerHTML = `
                    <div class="text-green blink-fast" style="font-size: 1.5rem; position:absolute; top:10px; left:10px;">PLAY ►</div>
                    <div class="text-green" style="font-size: 2.5rem; margin-bottom: 20px;">CH ${chId}</div>
                    <div class="vcr-text text-red" style="font-size: 2.2rem; margin-bottom: 30px; line-height: 1.2;">${ch.name}</div>
                    <div style="font-size: 1.2rem; color: var(--vcr-white); width: 100%; display:flex; justify-content: space-around; margin-bottom: 15px;">
                        <div><span style="color:#888;">TOTAL TIME</span><br>${totalTimeStr}</div>
                    </div>
                    <div style="font-size: 1.5rem; color: var(--vcr-green); border-top: 1px dashed #555; padding-top: 15px; width: 80%;">
                        ${ch.sets} ROUNDS
                    </div>
                `;
            },

            nextChannel() {
                this.menuState.currentIndex++;
                this.playSound('coin'); 
                this.triggerDegauss(); 
                this.renderMenu();
            },

            prevChannel() {
                this.menuState.currentIndex--;
                this.playSound('coin');
                this.triggerDegauss(); 
                this.renderMenu();
            },

            startSelectedChannel() {
                const channels = this.getAllChannels();
                if(channels.length > 0) {
                    this.startTimerPrep(channels[this.menuState.currentIndex]);
                }
            },

            addTag() {
                const iName = document.getElementById('build-tag-input').value.trim().toUpperCase();
                const iWork = document.getElementById('build-tag-work').value;
                const iRest = document.getElementById('build-tag-rest').value;
                const iGif = document.getElementById('build-tag-gif').value.trim();
                
                if(iName) {
                    this.data.builderTags.push({ 
                        name: iName, gif: iGif, 
                        work: iWork ? parseInt(iWork) : null, 
                        rest: iRest ? parseInt(iRest) : null 
                    });
                    document.getElementById('build-tag-input').value = '';
                    document.getElementById('build-tag-work').value = '';
                    document.getElementById('build-tag-rest').value = '';
                    document.getElementById('build-tag-gif').value = '';
                    this.renderTags();
                }
            },
            removeTag(index) { this.data.builderTags.splice(index, 1); this.renderTags(); },
            moveTag(index, dir) {
                if(index + dir < 0 || index + dir >= this.data.builderTags.length) return;
                const temp = this.data.builderTags[index];
                this.data.builderTags[index] = this.data.builderTags[index + dir];
                this.data.builderTags[index + dir] = temp;
                this.renderTags();
            },
            renderTags() {
                const list = document.getElementById('build-tag-list');
                list.innerHTML = '';
                this.data.builderTags.forEach((tag, idx) => {
                    const item = document.createElement('div');
                    item.className = 'tag-item';
                    
                    let timeStr = "";
                    if(tag.work !== null || tag.rest !== null) {
                        timeStr = `<br><span style="color:#888; font-size:0.7rem;">(W:${tag.work||'DEF'}s R:${tag.rest||'DEF'}s)</span>`;
                    }
                    const hasGif = tag.gif ? ' <span style="color:var(--vcr-green); font-size:0.7rem;">[GIF]</span>' : '';
                    
                    item.innerHTML = `
                        <div style="line-height:1.2;">[${(idx+1).toString().padStart(2,'0')}] ${tag.name}${hasGif}${timeStr}</div>
                        <div class="tag-actions" style="white-space:nowrap;">
                            <span onclick="app.moveTag(${idx}, -1)">▲</span>
                            <span onclick="app.moveTag(${idx}, 1)">▼</span>
                            <span style="color:var(--vcr-red)" onclick="app.removeTag(${idx})">[X]</span>
                        </div>
                    `;
                    list.appendChild(item);
                });
            },
            saveCustomChannel() {
                const name = document.getElementById('build-name').value.trim() || 'MY ROUTINE';
                const work = parseInt(document.getElementById('build-work').value) || 45;
                const rest = parseInt(document.getElementById('build-rest').value) || 15;
                const sets = parseInt(document.getElementById('build-sets').value) || 5;
                const playlist = this.data.builderTags.length > 0 ? this.data.builderTags : [{name: 'CUSTOM WORKOUT', gif: '', work: null, rest: null}];

                this.data.customChannels.push({ id: "CUST_" + Date.now(), type: "custom", name, work, rest, sets, gif: "", playlist });
                this.saveData();
                this.switchScreen('menu');
            },

            getCurrentExercise() {
                const ch = this.timer.activeChannel;
                let currentItem = ch.playlist[(this.timer.currentRound - 1) % ch.playlist.length];
                if (typeof currentItem === 'string') currentItem = { name: currentItem, gif: '', work: null, rest: null };
                return currentItem;
            },

            // 타이머 준비 시작 (READY 단계로 진입)
            startTimerPrep(channel) {
                this.timer.activeChannel = channel;
                this.timer.currentRound = 1;
                this.timer.isPaused = false;
                document.getElementById('screen-timer').classList.remove('is-paused');
                document.getElementById('btn-pause').innerText = '|| PAUSE';
                this.setTimerState('READY'); // WORK 대신 READY로 세팅
                this.switchScreen('timer');
                this.timerLoop();
            },

            setTimerState(newState) {
                this.timer.state = newState;
                const ch = this.timer.activeChannel;
                const screen = document.getElementById('screen-timer');
                const tContent = document.getElementById('timer-content');
                const indicator = document.getElementById('timer-indicator');
                const stateText = document.getElementById('timer-state-text');
                const timeEl = document.getElementById('timer-time');
                const gifEl = document.getElementById('timer-gif');

                this.triggerDegauss(); 
                const currentEx = this.getCurrentExercise();

                if (newState === 'READY') {
                    this.timer.remainingSec = 3;
                    
                    screen.classList.add('blue-screen');
                    tContent.className = 'vcr-play-mild';
                    gifEl.style.display = 'none';
                    
                    indicator.className = 'text-green blink'; indicator.innerText = 'STANDBY';
                    stateText.className = 'text-green'; stateText.innerText = 'READY';
                    timeEl.className = 'timer-time vcr-text text-green';

                } else if (newState === 'WORK') {
                    this.playSound('start');
                    this.timer.remainingSec = currentEx.work !== null && currentEx.work !== undefined ? currentEx.work : ch.work;
                    
                    screen.classList.remove('blue-screen');
                    tContent.className = 'vcr-play-mild';
                    
                    const targetGifSrc = currentEx.gif || ch.gif || this.fallbackGif;
                    gifEl.src = targetGifSrc;
                    gifEl.onerror = () => { if (gifEl.src !== this.fallbackGif && !gifEl.src.endsWith(this.fallbackGif)) gifEl.src = this.fallbackGif; else gifEl.style.display = 'none'; };
                    gifEl.style.display = 'block';
                    
                    indicator.className = 'text-red blink'; indicator.innerText = '● REC';
                    stateText.className = 'text-red'; stateText.innerText = 'WORK';
                    timeEl.className = 'timer-time vcr-text text-red';
                    
                } else if (newState === 'REST') {
                    this.playSound('rest');
                    this.timer.remainingSec = currentEx.rest !== null && currentEx.rest !== undefined ? currentEx.rest : ch.rest;
                    
                    screen.classList.add('blue-screen');
                    tContent.className = 'vcr-pause-heavy'; 
                    gifEl.style.display = 'none'; 
                    
                    indicator.className = 'text-green'; indicator.innerText = '|| PAUSE';
                    stateText.className = 'text-green'; stateText.innerText = 'REST';
                    timeEl.className = 'timer-time vcr-text text-green';
                }
                
                this.timer.targetTime = Date.now() + (this.timer.remainingSec * 1000);
                this.updateTimerUI();
            },

            updateTimerUI() {
                const ch = this.timer.activeChannel;
                const timeEl = document.getElementById('timer-time');
                const roundEl = document.getElementById('timer-round');
                
                const m = Math.floor(this.timer.remainingSec / 60).toString().padStart(2, '0');
                const s = (this.timer.remainingSec % 60).toString().padStart(2, '0');
                timeEl.innerText = `${m}:${s}`;
                
                if(this.timer.currentRound === ch.sets && this.timer.state === 'WORK') {
                    roundEl.innerText = 'FINAL ROUND'; roundEl.className = 'timer-round text-red blink-fast';
                } else if (this.timer.state === 'READY') {
                    roundEl.innerText = `GET READY`; roundEl.className = 'timer-round text-green blink';
                } else {
                    roundEl.innerText = `ROUND ${this.timer.currentRound.toString().padStart(2,'0')} / ${ch.sets.toString().padStart(2,'0')}`;
                    roundEl.className = 'timer-round text-green';
                }

                const currentExName = this.getCurrentExercise().name;
                let nextItem = ch.playlist[this.timer.currentRound % ch.playlist.length];
                const nextExName = this.timer.currentRound < ch.sets ? (typeof nextItem === 'string' ? nextItem : nextItem.name) : "NONE";

                if(this.timer.state === 'WORK') {
                    document.getElementById('timer-caption-current').innerText = `[ DOING ] ${currentExName}`;
                    document.getElementById('timer-caption-next').innerText = `NEXT: ${nextExName}`;
                } else if (this.timer.state === 'REST') {
                    document.getElementById('timer-caption-current').innerText = `[ RESTING ]`;
                    document.getElementById('timer-caption-next').innerText = `NEXT UP: ${nextExName}`; 
                } else if (this.timer.state === 'READY') {
                    document.getElementById('timer-caption-current').innerText = `[ STANDBY ]`;
                    document.getElementById('timer-caption-next').innerText = `FIRST UP: ${currentExName}`; 
                }
            },

            timerLoop() {
                if(this.timer.intervalId) clearInterval(this.timer.intervalId);
                this.timer.intervalId = setInterval(() => {
                    if(this.timer.isPaused) {
                        this.timer.targetTime = Date.now() + (this.timer.remainingSec * 1000);
                        return;
                    }
                    this.timer.remainingSec = Math.ceil((this.timer.targetTime - Date.now()) / 1000);
                    
                    // READY 상태에서도 3초 카운트다운 사운드가 재생되도록 추가
                    if(this.timer.remainingSec > 0 && this.timer.remainingSec <= 3 && (this.timer.state === 'REST' || this.timer.state === 'READY')) {
                        this.playSound('count');
                    }
                    
                    if (this.timer.remainingSec <= 0) {
                        this.timer.remainingSec = 0;
                        this.handlePhaseEnd();
                    }
                    this.updateTimerUI();
                }, 1000);
            },

            handlePhaseEnd() {
                if (this.timer.state === 'READY') {
                    this.setTimerState('WORK');
                } else if (this.timer.state === 'WORK') {
                    if (this.timer.currentRound >= this.timer.activeChannel.sets) this.completeWorkout();
                    else this.setTimerState('REST');
                } else if (this.timer.state === 'REST') {
                    this.timer.currentRound++;
                    this.setTimerState('WORK');
                }
            },

            togglePause() {
                this.timer.isPaused = !this.timer.isPaused;
                const indicator = document.getElementById('timer-indicator');
                const btnPause = document.getElementById('btn-pause');
                const tContent = document.getElementById('timer-content');
                const screen = document.getElementById('screen-timer'); 
                
                this.triggerDegauss(); 
                
                if(this.timer.isPaused) {
                    screen.classList.add('is-paused'); 
                    indicator.innerText = 'STILL';
                    indicator.classList.remove('blink');
                    screen.classList.add('blue-screen');
                    document.getElementById('timer-gif').style.display = 'none';
                    btnPause.innerText = '▶ PLAY';
                    tContent.className = 'vcr-pause-heavy'; 
                } else {
                    screen.classList.remove('is-paused'); 
                    btnPause.innerText = '|| PAUSE';
                    
                    if(this.timer.state === 'WORK') {
                        tContent.className = 'vcr-play-mild'; 
                        indicator.innerText = '● REC'; 
                        indicator.classList.add('blink');
                        screen.classList.remove('blue-screen');
                        document.getElementById('timer-gif').style.display = 'block';
                    } else if (this.timer.state === 'READY') {
                        tContent.className = 'vcr-play-mild';
                        indicator.innerText = 'STANDBY';
                        indicator.classList.add('blink');
                    } else {
                        tContent.className = 'vcr-pause-heavy'; 
                        indicator.innerText = '|| PAUSE';
                    }
                }
            },
            
            stopTimer() {
                clearInterval(this.timer.intervalId);
                this.timer.isPaused = false;
                document.getElementById('screen-timer').classList.remove('is-paused');
                this.playSound('rest'); 
                this.switchScreen('menu'); 
            },

            completeWorkout() {
                clearInterval(this.timer.intervalId);
                this.playSound('complete');
                const now = new Date();
                const logEntry = `SP ${now.getFullYear()}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getDate().toString().padStart(2,'0')} ${now.toTimeString().split(' ')[0]} | ${this.timer.activeChannel.name} | REC COMPLETE`;
                this.data.logs.unshift(logEntry);
                if(this.data.logs.length > 50) this.data.logs.pop();
                this.saveData();
                this.switchScreen('log');
            },

            renderLog() {
                const ta = document.getElementById('log-textarea');
                ta.value = "[TAPE LOG ARCHIVE]\n-----------------------------------------\n" +
                           (this.data.logs.length === 0 ? "NO RECORDS FOUND.\n" : this.data.logs.join("\n") + "\n") +
                           "-----------------------------------------\n[CUSTOM CHANNELS DATA]\n" +
                           JSON.stringify(this.data.customChannels, null, 2);
            },

            importData() {
                try {
                    const jsonStr = document.getElementById('log-textarea').value.split('[CUSTOM CHANNELS DATA]\n')[1];
                    if(jsonStr) {
                        const parsed = JSON.parse(jsonStr);
                        if(Array.isArray(parsed)) {
                            this.data.customChannels = parsed;
                            this.saveData();
                            this.switchScreen('menu');
                            return;
                        }
                    }
                    throw new Error();
                } catch(e) { console.error('ERROR: CANNOT READ TAPE DATA.'); }
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
